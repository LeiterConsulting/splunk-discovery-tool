name: Repo Validation

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: repo-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    env:
      FRONTEND_BUILD_PYTHON: python
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUTF8: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install frontend build dependencies
        run: npm ci

      - name: Build frontend bundle
        run: npm run build:frontend

      - name: Check frontend bundle sync
        run: python tools/check_frontend_sync.py

      - name: Install Playwright browser dependencies
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser
        if: runner.os == 'Windows'
        run: npx playwright install chromium

      - name: Run visualization browser regression
        run: npm run test:browser

      - name: Run Ruff
        run: python -m ruff check src tests

      - name: Run strict compile validation
        run: python -W error::SyntaxWarning -m compileall -q src tests

      - name: Run unit tests
        run: python -m unittest discover -v